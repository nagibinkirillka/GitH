balkon_setting:
  homeassistant:
    customize:
      binary_sensor.0x00158d00070846f9_contact:
        friendly_name: "Окно балкон"
        device_class: window
        icon: mdi:window-open-variant
      sensor.0x00124b0023a4deca_linkquality:
        friendly_name: "Окно балкон - связь до ZigBee"
        icon: mdi:signal
      switch.pc01:
        friendly_name: Компьютер
        device_class: plug
        icon: mdi:desktop-classic
      switch.lodjiya_sw_relay:
        friendly_name: "Выключатель балкон"
        icon: mdi:lightbulb
      binary_sensor.balkon_windows:
        friendly_name: "Окно на балконе"
        device_class: window
      sensor.0x00158d000799a354_action:
        friendly_name: Беспроводной Куб
      sensor.0x00158d000799a354_battery:
        device_class: battery
        friendly_name: Беспроводной Куб
      sensor.0x00158d000799a354_zigbee:
        friendly_name: Беспроводной Куб
        icon: mdi:zigbee
      sensor.0x00158d00070846f9_battery:
        friendly_name: "Окно балкон"
        device_class: battery
      binary_sensor.computer_pc:
        friendly_name: "Компьютер"
        device_class: running
      switch.balkon_switch:
        friendly_name: "Выключатель балкон"
        icon: mdi:lightbulb
      switch.lodjiya_sw_lodjiya_sw_relay:
        friendly_name: "Реле балкон"
        icon: mdi:relay
      cover.0xa4c138130a392f5a:
        friendly_name: "Шторы спальня"
      scene.0xa4c138130a392f5a_1_1:
        friendly_name: "Шторы спальня - Сцена 1"
      scene.0xa4c138130a392f5a_2_5_open:
        friendly_name: "Шторы спальня - Открыть"
      scene.0xa4c138130a392f5a_3_333:
        friendly_name: "Шторы спальня - 333"
      scene.0xa4c138130a392f5a_4_scene_4:
        friendly_name: "Шторы спальня - Сцена 4"
      select.0xa4c138130a392f5a_motor_direction:
        friendly_name: "Шторы спальня - Направление мотора"
      select.0xa4c138130a392f5a_set_limits:
        friendly_name: "Шторы спальня - Установка лимитов"
      sensor.0xa4c138130a392f5a_battery:
        friendly_name: "Шторы спальня - Батарея"
        device_class: battery
      sensor.0xa4c138130a392f5a_last_seen:
        friendly_name: "Шторы спальня - Last seen"
      sensor.0xa4c138130a392f5a_linkquality:
        friendly_name: "Шторы спальня - Качество связи"
      switch.0xa4c138130a392f5a_child_lock:
        friendly_name: "Шторы спальня - Детский замок"
      switch.0xa4c138130a392f5a_tilt_mode:
        friendly_name: "Шторы спальня - Режим наклона"

  template:
    - binary_sensor:
        - name: balkon_windows
          device_class: window
          state: >
            {{ is_state('binary_sensor.0x00158d00070846f9_contact', 'on') }}
          icon: >
            {% if is_state('binary_sensor.balkon_windows', 'on') %}
              mdi:window-open-variant
            {% else %}
              mdi:window-closed-variant
            {% endif %}

    - switch:
        - turn_on:
            - entity_id:
                - switch.lodjiya_sw_lodjiya_sw_relay
              action: switch.turn_on
          turn_off:
            - entity_id:
                - switch.lodjiya_sw_lodjiya_sw_relay
              action: switch.turn_off
          default_entity_id: switch.lodjiya_sw_relay
          icon: >
            {% if is_state('switch.balkon_switch', 'on') %}
              mdi:lightbulb
            {% else %}
              mdi:lightbulb-outline
            {% endif %}
          name: Выключатель балкон
          state: "{{ is_state('switch.lodjiya_sw_relay', 'on')}}"

        - turn_off:
            service: hassio.addon_stdin
            data:
              addon: core_rpc_shutdown
              input: "Pc-Family"
          name: Pc-Family
          state: "{{ is_state('binary_sensor.computer_pc', 'on')}}"

  script:
    balkon_cover_3:
      alias: "Балкон - открыть на 5%"
      sequence:
        - service: cover.set_cover_position
          target:
            entity_id: cover.0xa4c138130a392f5a
          data:
            position: 5

    balkon_cover_25:
      alias: "Балкон - открыть на 25%"
      sequence:
        - service: cover.set_cover_position
          target:
            entity_id: cover.0xa4c138130a392f5a
          data:
            position: 25

    balkon_cover_35:
      alias: "Балкон - открыть на 35%"
      sequence:
        - service: cover.set_cover_position
          target:
            entity_id: cover.0xa4c138130a392f5a
          data:
            position: 35

    balkon_cover_50:
      alias: "Балкон - открыть на 50%"
      sequence:
        - service: cover.set_cover_position
          target:
            entity_id: cover.0xa4c138130a392f5a
          data:
            position: 50

    balkon_cover_75:
      alias: "Балкон - открыть на 75%"
      sequence:
        - service: cover.set_cover_position
          target:
            entity_id: cover.0xa4c138130a392f5a
          data:
            position: 75

    balkon_cover_close:
      alias: "Балкон - закрыть"
      sequence:
        - service: cover.close_cover
          target:
            entity_id: cover.0xa4c138130a392f5a

    balkon_cover_open:
      alias: "Балкон - открыть"
      sequence:
        - service: cover.open_cover
          target:
            entity_id: cover.0xa4c138130a392f5a
          data:
            value: 50

    balkon_cover_open2:
      alias: Blinds 50 MQTT
      sequence:
        - service: mqtt.publish
          data:
            topic: zigbee2mqtt/0xa4c138130a392f5a/set
            payload: '{ "state": "open", "motor_direction": "normal" }'
        - delay: 2
        - service: mqtt.publish
          data:
            topic: zigbee2mqtt/0xa4c138130a392f5a/set
            payload: '{"state":"STOP"}'
      mode: single
