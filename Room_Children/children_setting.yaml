        friendly_name: "Кузя статус"
        icon: mdi:air-humidifier

  template:
    - binary_sensor:
        - name: detskaya_kuzya
          state: >
            {{ is_state('humidifier.uvlazhnitel', 'on') }}
          icon: >
            {% if is_state('binary_sensor.spalnya_kuzya', 'on') %}
              mdi:air-humidifier
            {% else %}
              mdi:air-humidifier
            {% endif %}

        - name: detskaya_condition
          device_class: window
          state: >
            {{ is_state('binary_sensor.0x00158d00068a0604_contact', 'on') }}
          icon: >
            {% if is_state('binary_sensor.detskaya_condition', 'on') %}
              mdi:air-conditioner
            {% else %}
              mdi:air-conditioner
            {% endif %}

        - name: detskaya_windows
          device_class: window
          state: >
            {{ is_state('binary_sensor.0x00158d00067f0d82_contact', 'on') }}
          icon: >
            {% if is_state('binary_sensor.detskaya_windows', 'on') %}
              mdi:window-open-variant
            {% else %}
              mdi:window-closed-variant
            {% endif %}

        - name: detskaya_motion
          device_class: motion
          state: >
            {{ is_state('binary_sensor.sensor_motion_detskaya', 'on') }}
          icon: >
            {% if is_state('binary_sensor.detskaya_motion', 'on') %}
              mdi:motion-sensor
            {% else %}
              mdi:motion-sensor-off
            {% endif %}

    - sensor:
        - name: detskaya_temperature_virt
          unit_of_measurement: "°C"
          device_class: temperature
          icon: mdi:temperature-celsius
          state: >
            {{ ((
                (states('sensor.0xa4c138c42156a83b_temperature') | float(0)) +
                (states('sensor.detskaya_temperature') | float(0))
                ) / 2) | round(2)
              }}

        - name: detskaya_humidity_virt
          unit_of_measurement: "%"
          device_class: humidity
          icon: mdi:water-percent
          state: >
            {{ ((
                (states('sensor.0xa4c138c42156a83b_humidity') | float(0)) +
                (states('sensor.detskaya_humidity') | float(0))
                ) / 2) | round(2)
              }}

    - switch:
        - turn_on:
            - entity_id:
                - switch.0x60a423fffeb046fa_right
                - switch.0x60a423fffeb046fa_left
              action: switch.turn_on
          turn_off:
            - entity_id:
                - switch.0x60a423fffeb046fa_right
                - switch.0x60a423fffeb046fa_left
              action: switch.turn_off
          default_entity_id: switch.detskaya_switch
          icon: >
            {% if is_state('detskaya_switch', 'on') %}
              mdi:lightbulb
            {% else %}
              mdi:lightbulb-outline
            {% endif %}
          name: Выключатель детская
          state: >
            {{ is_state('switch.0x60a423fffeb046fa_right', 'on') and is_state('switch.0x60a423fffeb046fa_left', 'on')}}

        - turn_on:
            - entity_id:
                - switch.0x60a423fffeb046fa_right
              action: switch.turn_on
          turn_off:
            - entity_id:
                - switch.0x60a423fffeb046fa_right
              action: switch.turn_off
          default_entity_id: switch.detskaya_r_switch
          icon: >
            {% if is_state('switch.detskaya_r_switch', 'on') %}
              mdi:lightbulb
            {% else %}
              mdi:lightbulb-outline
            {% endif %}
          name: Выключатель детская - малый свет
          state: "{{ is_state('switch.0x60a423fffeb046fa_right', 'on')}}"

        - turn_on:
            - entity_id:
                - switch.0x60a423fffeb046fa_left
              action: switch.turn_on
          turn_off:
            - entity_id:
                - switch.0x60a423fffeb046fa_left
              action: switch.turn_off
          default_entity_id: switch.detskaya_l_switch
          icon: >
            {% if is_state('switch.detskaya_l_switch', 'on') %}
              mdi:lightbulb
            {% else %}
              mdi:lightbulb-outline
            {% endif %}
          name: Выключатель детская - большой свет
          state: "{{ is_state('switch.0x60a423fffeb046fa_left', 'on')}}"
