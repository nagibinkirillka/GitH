bedroom_setting:
  homeassistant:
    customize:
      sensor.0x00158d00068a06f5_battery:
        friendly_name: "Кондиционер спальня"
        device_class: battery
      sensor.0x00158d00068a06f5_zigbee:
        friendly_name: "Кондиционер спальня"
        icon: mdi:zigbee
      switch.0xa4c13800371f889b:
        friendly_name: "Спальная комп"
        icon: mdi:power-socket-eu
      sensor.0xa4c13800371f889b_energy:
        friendly_name: "Спальная комп энергия"
        icon: mdi:lightning-bolt-outline
      sensor.0xa4c13800371f889b_power:
        friendly_name: "Спальная комп мощность"
        icon: mdi:lightning-bolt
      switch.0xa4c13883ea7103db:
        friendly_name: "Кондиционер в спальной"
        icon: mdi:power-socket-eu
      sensor.0xa4c13883ea7103db_energy:
        friendly_name: "Кондиционер в спальной энергия"
        icon: mdi:lightning-bolt-outline
      sensor.0xa4c13883ea7103db_power:
        friendly_name: "Кондиционер в спальной мощность"
        icon: mdi:lightning-bolt
      climate.spalnya_ac:
        friendly_name: "Кондиционер - спальня"
      media_player.lg_webos_tv_un81006lb:
        friendly_name: "Телевизор LG в спальне"
        device_class: tv
        icon: mdi:television-classic
      media_player.yandex_station_r10f2y0001a3gg:
        friendly_name: "Яндекс станция в спальной"
      binary_sensor.yandex_station_r10f2y0001a3gg_assumed_state:
        friendly_name: "Яндекс станция в спальной"
      binary_sensor.0x00158d00068a06f5_contact:
        friendly_name: "Кондиционер спальня - контакт"
        device_class: window
        icon: mdi:air-conditioner
      switch.0x847127fffea0f2ab:
        friendly_name: "Выключатель спальня"
        icon: mdi:lightbulb
      script.clean_living_spalnya:
        friendly_name: уборка в спальной
        icon: mdi:robot-vacuum
      humidifier.uvl_spalnia:
        friendly_name: "Афоня"
        device_class: humidifier
        icon: mdi:air-humidifier
      binary_sensor.spalnya_motion:
        friendly_name: "Движение спальня"
        device_class: motion
        icon: mdi:motion-sensor
      binary_sensor.pir_sensor_spalnya:
        friendly_name: "Движение спальня"
        device_class: motion
        icon: mdi:motion-sensor
      binary_sensor.spalnya_afonya:
        friendly_name: "Афоня"
        icon: mdi:air-humidifier
      binary_sensor.spalnya_condition:
        friendly_name: "Кондиционер - спальня"
        icon: mdi:air-conditioner
      sensor.spalnya_temperature_virt:
        friendly_name: "Средняя температура в спальной"
        unit_of_measurement: "°C"
        device_class: temperature
      sensor.spalnya_humidity_virt:
        friendly_name: "Средняя влажность в спальной"
        unit_of_measurement: "%"
        device_class: humidity
      switch.0xa4c13897280a0fc3:
        friendly_name: "Пилот в спальной"
        icon: mdi:power-socket-eu
      sensor.spalnya_humidity:
        friendly_name: "Влажность спальня"
        unit_of_measurement: "%"
        device_class: humidity
      sensor.spalnya_temperature:
        friendly_name: "Температура спальня"
        unit_of_measurement: "°C"
        device_class: temperature
      sensor.0x00158d000ad98aad_humidity:
        friendly_name: "Средняя влажность в спальной"
        unit_of_measurement: "%"
        device_class: humidity
      sensor.0x00158d000ad98aad_temperature:
        friendly_name: "Средняя температура в спальной"
        unit_of_measurement: "°C"
        device_class: temperature
      sensor.0x00158d000ad98aad_battery:
        friendly_name: "Датчик влажности спальная"
        device_class: battery
      switch.spalnya_switch:
        friendly_name: "Выключатель спальня"
        icon: mdi:lightbulb

  template:
    - binary_sensor:
        - name: spalnya_motion
          device_class: motion
          state: >
            {{ is_state('binary_sensor.pir_sensor_spalnya', 'on') }}
          icon: >
            {% if is_state('binary_sensor.spalnya_motion', 'on') %}
              mdi:motion-sensor
            {% else %}
              mdi:motion-sensor-off
            {% endif %}

        - name: spalnya_condition
          device_class: window
          state: >
            {{ is_state('binary_sensor.0x00158d00068a06f5_contact', 'on') }}
          icon: >
            {% if is_state('binary_sensor.spalnya_condition', 'on') %}
              mdi:air-conditioner
            {% else %}
              mdi:air-conditioner
            {% endif %}

        - name: spalnya_afonya
          state: >
            {{ is_state('humidifier.uvl_spalnia', 'on') }}
          icon: >
            {% if is_state('binary_sensor.spalnya_afonya', 'on') %}
              mdi:air-humidifier
            {% else %}
              mdi:air-humidifier
            {% endif %}

    - sensor:
        - name: spalnya_temperature_virt
          unit_of_measurement: "°C"
          device_class: temperature
          icon: mdi:temperature-celsius
          state: >-
            {{ (states('sensor.0x00158d000ad98aad_temperature') | float(0)) }}

        - name: spalnya_humidity_virt
          unit_of_measurement: "%"
          device_class: humidity
          icon: mdi:water-percent
          state: >-
            {{ (states('sensor.0x00158d000ad98aad_humidity') | float(0)) | round(2) }}

    - switch:
        - turn_on:
            - entity_id:
                - switch.0x847127fffea0f2ab
              action: switch.turn_on
          turn_off:
            - entity_id:
                - switch.0x847127fffea0f2ab
              action: switch.turn_off
          default_entity_id: switch.spalnya_switch
          icon: >
            {% if is_state('switch.spalnya_switch', 'on') %}
              mdi:lightbulb
            {% else %}
              mdi:lightbulb-outline
            {% endif %}
          name: Выключатель спальня
          state: "{{ is_state('switch.0x847127fffea0f2ab', 'on')}}"
