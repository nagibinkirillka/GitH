system_influxdb:
  influxdb:
    tags:
      source: HomeAssistant
    tags_attributes:
      - friendly_name
    default_measurement: units
    ignore_attributes:
      - icon
    include:
      domains:
        - switch
        - light
        - media_player
        - climate
        - device_tracker
        - select
        - counter
      entity_globs:
        - binary_sensor.signalizatsii*
