system_influxdb:
  influxdb:
    tags:
      source: HomeAssistant
    tags_attributes:
      - friendly_name
    default_measurement: units
    ignore_attributes:
      - icon
    include:
      domains:
        - sensor
        - switch
        - light
        - media_player
        - climate
      entity_globs:
        - sensor.co2_*
        - sensor.*_temperature
        - sensor.*_humidity
        - binary_sensor.*_door
        - binary_sensor.*_motion
        - binary_sensor.*_windows
        - binary_sensor.*_occupancy
        - binary_sensor.*_contact
        - binary_sensor.*_gateway
        - binary_sensor.*_condition
        - binary_sensor.*_moisture
        - sensor.*_illuminance
        - sensor.*_battery
        - sensor.*_energy
