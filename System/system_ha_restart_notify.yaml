system_ha_restart_notify:
  automation:
    - alias: System_Notify_HA_Restart
      description: "Оповещение о перезагрузке HA"
      mode: single
      trigger:
        - platform: homeassistant
          event: start
      action:
        - variables:
            restart_time: "{{ (now() - states('sensor.uptime')).total_seconds() | int(default=0) }}"
            unavailable_count: >
              {% set ns = namespace(count=0) %}
              {% for entity in states %}
                {% if entity.state == 'unavailable' or entity.state == 'unknown' %}
                  {% set ns.count = ns.count + 1 %}
                {% endif %}
              {% endfor %}
              {{ ns.count }}
            unavailable_list: >
              {% set ns = namespace(list='') %}
              {% for entity in states %}
                {% if entity.state == 'unavailable' or entity.state == 'unknown' %}
                  {% set ns.list = ns.list + '• ' + entity.entity_id + '\n' %}
                {% endif %}
              {% endfor %}
              {{ ns.list if ns.list else 'Все устройства доступны' }}
        - action: telegram_bot.send_message
          data:
            entity_id:
              - notify.maylie_opoveshchenie_ot_um_doma_1001785858034
            title: "{{ '\U0001F504' }} *Системное оповещение*"
            message: |
              ⏰ **Home Assistant перезагрузился**

              📅 Дата: {{ now().strftime('%d.%m.%Y') }}
              ⏱ Время: {{ now().strftime('%H:%M') }}

              🔌 Время простоя: {{ restart_time }} сек

              ❌ Недоступно устройств: {{ unavailable_count }}

              {{ unavailable_list }}
            parse_mode: markdownv2
            disable_web_page_preview: true

        # - delay: "00:00:10"

        # - service: media_player.play_media
