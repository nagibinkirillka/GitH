system_ha_restart_notify:
  automation:
    - alias: System_Notify_HA_Restart
      description: "Оповещение о перезагрузке HA"
      mode: single
      trigger:
        - platform: homeassistant
          event: start
      action:
        - delay: "00:00:30"
        - variables:
            restart_time: >
              {% set uptime_ts = states('sensor.uptime') %}
              {% if uptime_ts not in ['unknown', 'unavailable', 'none'] %}
                {{ (now() - as_datetime(uptime_ts)).total_seconds() | int(default=0) }}
              {% else %}
                0
              {% endif %}
            unavailable_count: >
              {% set ns = namespace(count=0) %}
              {% for entity in states %}
                {% if entity.state in ['unavailable', 'unknown'] %}
                  {% set ns.count = ns.count + 1 %}
                {% endif %}
              {% endfor %}
              {{ ns.count }}
            unavailable_list: >
              {% set ns = namespace(list='') %}
              {% for entity in states %}
                {% if entity.state in ['unavailable', 'unknown'] %}
                  {% set name = state_attr(entity.entity_id, 'friendly_name') %}
                  {% set ns.list = ns.list + '• ' + (name if name else entity.entity_id) + '\n' %}
                {% endif %}
              {% endfor %}
              {{ ns.list if ns.list else '✅ Все устройства доступны' }}
        - action: telegram_bot.send_message
          data:
            entity_id:
              - notify.maylie_opoveshchenie_ot_um_doma_1001785858034
            title: "{{ '\U0001F504' }} *Системное оповещение*"
            message: |
              ⏰ **Home Assistant перезагрузился**

              📅 Дата: {{ now().strftime('%d.%m.%Y') }}
              ⏱ Время: {{ now().strftime('%H:%M') }}

              🔌 Время простоя: ~{{ (restart_time / 60) | int }} мин

              ❌ Недоступно устройств: {{ unavailable_count }}

              {{ unavailable_list }}
            parse_mode: markdown
            disable_web_page_preview: true

        # - delay: "00:00:10"

        # - service: media_player.play_media
        #   entity_id: group.yandex_stations
        #   data:
        #     media_content_id: >
        #       {% if unavailable_count > 5 %}
        #         Внимание! Home Assistant перезагрузился. Недоступно {{ unavailable_count }} устройств.
        #       {% else %}
        #         Home Assistant перезагрузился. Всё в порядке.
        #       {% endif %}
        #     media_content_type: text
        #     extra:
        #       volume_level: 0.5

    - alias: Notify_Desktop_User_Login
      description: "Оповещение о входе пользователя на Desktop"
      initial_state: true
      mode: single
      trigger:
        - platform: state
          entity_id: sensor.desktop_k9lquu9_satellite_loggeduser
      condition:
        - condition: template
          value_template: "{{ trigger.to_state.state != 'unknown' and trigger.to_state.state != '' }}"
      action:
        - action: telegram_bot.send_message
          data:
            entity_id:
              - notify.maylie_kirill_208710873
            title: "{{ '\U0001F4BB' }} *Оповещение о входе*"
            message: |
              ✅ **Пользователь вошёл на Desktop**

              👤 Имя пользователя: {{ trigger.to_state.state }}
              📅 Дата: {{ now().strftime('%d.%m.%Y') }}
              ⏱ Время: {{ now().strftime('%H:%M') }}
            parse_mode: html

    - alias: Notify_Desktop_User_Logout
      description: "Оповещение о выходе пользователя с Desktop"
      initial_state: true
      mode: single
      trigger:
        - platform: state
          entity_id: sensor.desktop_k9lquu9_satellite_loggeduser
          to: ""
        - platform: state
          entity_id: sensor.desktop_k9lquu9_satellite_loggeduser
          to: "unknown"
      condition:
        - condition: template
          value_template: "{{ trigger.from_state.state not in ['unknown', 'unavailable', ''] }}"
      action:
        - action: telegram_bot.send_message
          data:
            entity_id:
              - notify.maylie_kirill_208710873
            title: "{{ '\U0001F4BB' }} *Оповещение о выходе*"
            message: |
              ❌ **Пользователь вышел с Desktop**

              👤 Имя пользователя: {{ trigger.from_state.state }}
              📅 Дата: {{ now().strftime('%d.%m.%Y') }}
              ⏱ Время: {{ now().strftime('%H:%M') }}
            parse_mode: html
