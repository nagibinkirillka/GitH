system_yandex_smart_home:
  yandex_smart_home:
    filter:
      exclude_entities:
        - switch.led_kuhnja_switch_led_kuhnja
      include_entities:
        - switch.detskaya_l_switch
        - switch.detskaya_r_switch
        - switch.koridor_switch
        - switch.kuhnya_switch
        - switch.spalnya_switch
        - switch.vannaya_switch
        - switch.tualet_switch
        - switch.tualet_vit_water_cold
        - switch.tualet_vit_water_hot
        - switch.tualet_vit
        - switch.kuhnya_vitajka_kuhnya_vitajka_relay
        - sensor.waterius_8931698_ch1
        - sensor.waterius_8931698_ch0
        - cover.0xa4c138130a392f5a
        - light.led_koridor_ws2812_koridor
        - light.led_kuhnja_ws2812_kyhnya
        - sensor.spalnya_temperature_virt
        - switch.led_kuhnja_switch_led_kuhnja
    entity_config:
      switch.detskaya_r_switch:
        name: "Свет детская малый"
        room: Детская
        type: devices.types.light
      switch.detskaya_l_switch:
        name: "Свет детская больш"
        room: Детская
        type: devices.types.light
      switch.koridor_switch:
        name: "Свет коридор"
        room: Коридор
        type: devices.types.light
      switch.kuhnya_switch:
        name: "кухня"
        room: Кухня
        type: devices.types.light
      switch.spalnya_switch:
        name: "Свет спальня"
        room: Спальня
        type: devices.types.light
      switch.vannaya_switch:
        name: "Свет ванная"
        room: Ванная
        type: devices.types.light
      switch.tualet_switch:
        name: "Свет туалет"
        room: Туалет
        type: devices.types.light
      switch.tualet_vit_water_cold:
        name: "Холодная вода"
        room: Туалет
        type: devices.types.openable.valve
      switch.tualet_vit_water_hot:
        name: "Горячая вода"
        room: Туалет
        type: devices.types.openable.valve
      switch.tualet_vit:
        name: "Туалет вытяжка"
        room: Туалет
        type: devices.types.ventilation.fan
      switch.kuhnya_vitajka_kuhnya_vitajka_relay:
        name: "Вытяжка кухня"
        room: Кухня
        type: devices.types.ventilation.fan
      sensor.waterius_8931698_ch0:
        name: "Счетчик горячей воды"
        room: Туалет
      sensor.waterius_8931698_ch1:
        name: "Счетчик холодной воды"
        room: Туалет
      cover.0xa4c138130a392f5a:
        name: "Шторы"
        room: спальня
        # type: devices.types.openable
        state_unknown: true
      light.led_kuhnja_ws2812_kyhnya:
        name: "Лента кухня"
        room: Кухня
        type: devices.types.light.strip
      light.led_koridor_ws2812_koridor:
        name: "Лента коридор"
        room: Прихожая
        type: devices.types.light.strip
      sensor.spalnya_temperature_virt:
        name: "спальной"
        room: Спальня
        properties:
          - type: temperature
            entity: sensor.spalnya_temperature_virt
          - type: humidity
            entity: sensor.spalnya_humidity_virt
          - type: co2_level
            entity: sensor.co2_co2
