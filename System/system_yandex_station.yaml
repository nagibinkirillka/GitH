  script:
    do_vechera_all_off:
      sequence:
        - service: switch.turn_off
          entity_id:
            - switch.pc01
            - switch.kuhnya_switch
            - switch.tualet_switch
            - switch.vanaya_switch
            - switch.koridor_switch
            - switch.detskaya_l_switch
            - switch.detskaya_r_switch
            - switch.spalnya_switch
        - service: light.turn_off
          entity_id:
            # - light.fastled_ws2812b_detskaya
            - light.fastled_ws2812b_koridor
        - service: media_player.turn_off
          entity_id:
            - media_player.yandex_station_r10f2y0001a3gg
            - media_player.yandex_station_ff98f029da2ccfe96d59979c
            - media_player.yandex_station_ff98f0292dedabbd40dc35d9
            - media_player.yandex_station_m007e85001yzgb
            - media_player.lg_webos_tv_uk6300plb
            - media_player.lg_webos_tv_un81006lb

    slip_all_off:
      sequence:
        - service: switch.turn_off
          entity_id:
            - switch.pc01
            - switch.kuhnya_switch
            - switch.tualet_switch
            - switch.vanaya_switch
            - switch.koridor_switch
            - switch.detskaya_l_switch
            - switch.detskaya_r_switch
            - switch.spalnya_switch
        - service: media_player.turn_off
          entity_id:
            - media_player.yandex_station_ff98f029da2ccfe96d59979c
            - media_player.yandex_station_ff98f0292dedabbd40dc35d9
            - media_player.yandex_station_m007e85001yzgb
            - media_player.yandex_station_r10f2y0001a3gg
            - media_player.lg_webos_tv_uk6300plb
            - media_player.lg_webos_tv_un81006lb

    yandex_play_url:
      alias: Проигрывание медиа по ссылке
      sequence:
        - service: media_player.play_media
          entity_id: media_player.yandex_station_r10f2y0001a3gg # замените на вашу колонку
          data:
            media_content_id: Поставь на всех колонках звук 7
            media_content_type: command
        - delay: 00:00:02
        - service: media_player.play_media
          entity_id: media_player.yandex_station_r10f2y0001a3gg # замените на вашу колонку
          data:
            media_content_id: Включи на всех колонках музыку
            media_content_type: command
        - delay: 00:00:05
        - service: media_player.play_media
          entity_id: media_player.yandex_station_r10f2y0001a3gg # замените на вашу колонку
          data:
            media_content_id: https://music.yandex.ru/users/nagibin.kirillka/playlists/3
            media_content_type: xxx # тип не важен, но должен быть!

